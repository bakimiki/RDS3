<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEYOND THE FOG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500&display=swap');
    @import url('https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #000;
      --white: #fff;
      --gray: #888;
      --light-gray: #e0e0e0;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      cursor: default;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    #header span {
      font-size: 50pt;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    /* ── FLOATING TEXTS ── */
    #floating-layer {
      position: fixed;
      top: 80px;
      left: 32px;
      right: 32px;
      height: calc(55vh - 80px);
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .floating-text {
      position: absolute;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      font-size: 24pt;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      opacity: 0.28;
      animation: floatDrift ease-in-out infinite alternate;
    }

    @keyframes floatDrift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(var(--dx1), var(--dy1)); }
    }

    /* ── HERO (blurred car) ── */
    #hero {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #hero-img {
      width: 70%;
      max-width: 900px;
      filter: blur(18px) contrast(1.1);
      opacity: 0.85;
      object-fit: contain;
      user-select: none;
    }

    #hero-placeholder {
      width: 60%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: radial-gradient(ellipse at 50% 60%, #1a1a1a 0%, #888 40%, #fff 100%);
      filter: blur(28px) contrast(1.2);
      border-radius: 50%;
      opacity: 0.7;
    }

    /* ── SCROLL SECTION ── */
    #scroll-section {
      position: relative;
    }

    /* sticky container that pins while we scroll through images */
    #sticky-container {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* the big featured image */
    #featured-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #featured-img {
      max-width: 55vw;
      max-height: 75vh;
      object-fit: contain;
      cursor: pointer;
      transition: opacity 0.35s ease;
      filter: grayscale(100%);
    }

    #featured-img:hover {
      opacity: 0.85;
    }

    /* grid strip at bottom */
    #grid-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      gap: 0;
      overflow: hidden;
      height: 22vh;
    }

    .grid-thumb {
      flex: 0 0 calc(100% / 4);
      height: 100%;
      overflow: hidden;
      opacity: 0.55;
      transition: opacity 0.3s;
      cursor: default;
    }

    .grid-thumb.active {
      opacity: 1;
    }

    .grid-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
    }

    /* spacer divs that create scroll height */
    .scroll-spacer {
      height: 100vh;
    }

    /* ── DETAIL PANEL ── */
    #detail-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: #fff;
    }

    #detail-panel.open {
      pointer-events: all;
      opacity: 1;
    }

    #detail-inner {
      position: absolute;
      top: 60px;
      left: 32px;
      right: 32px;
      display: grid;
      grid-template-columns: 140px 280px 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    #detail-ref {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--black);
    }

    #detail-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.02em;
    }

    .detail-meta-row {
      display: flex;
      gap: 16px;
      margin-bottom: 6px;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .detail-meta-row .label {
      font-weight: 500;
      text-transform: uppercase;
      min-width: 110px;
    }

    #detail-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      margin-top: 16px;
      filter: none;
    }

    .detail-text-block h4 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-text-block p {
      font-size: 12px;
      line-height: 1.7;
      font-weight: 300;
      color: #222;
    }

    #close-btn {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--black);
    }

    #close-btn:hover {
      opacity: 0.5;
    }

    /* ── JINX SECTION ── */
    #jinx-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    #jinx-bg-orb {
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      height: 80vw;
      background: radial-gradient(ellipse at 50% 30%, #d0d0d0 0%, #e8e8e8 40%, transparent 75%);
      border-radius: 50%;
      pointer-events: none;
    }

    #jinx-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 80px 32px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }

    #jinx-labels {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--black);
    }

    #jinx-form {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--black);
      width: 60%;
      max-width: 700px;
      background: rgba(255,255,255,0.85);
      padding: 12px 0;
    }

    #jinx-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--black);
      width: 100%;
      text-transform: uppercase;
    }

    #jinx-input::placeholder {
      color: var(--gray);
    }

    #jinx-submit {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      color: var(--black);
      padding: 0 0 0 16px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 0.6s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }


    /* ── GRAY CIRCLE at bottom like figma ── */
    #bottom-orb {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 80px 0 200px;
    }

    #bottom-orb-shape {
      width: 60vw;
      height: 30vw;
      background: radial-gradient(ellipse at 50% 100%, #c8c8c8 0%, #e8e8e8 50%, transparent 100%);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">Loading</div>

<!-- HEADER -->
<header id="header">
  <span>BEYOND</span>
  <span>THE</span>
  <span>FOG</span>
</header>

<!-- FLOATING TEXT LAYER -->
<div id="floating-layer"></div>

<!-- HERO -->
<section id="hero">

</section>

<!-- SCROLL SECTION (populated by JS) -->
<div id="scroll-section"></div>

<!-- BOTTOM ORB -->
<div id="bottom-orb">
  <div id="bottom-orb-shape"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div id="detail-inner">
    <!-- col 1: ref + title -->
    <div>
      <div id="detail-ref">REF: <span id="d-ref"></span></div>
      <div id="detail-title"></div>
      <img id="detail-photo" src="" alt="" />
    </div>
    <!-- col 2: meta -->
    <div style="padding-top:40px">
      <div class="detail-meta-row"><span class="label">CATEGORY</span><span id="d-category"></span></div>
      <div class="detail-meta-row"><span class="label">REGION</span><span id="d-region"></span></div>
      <div class="detail-meta-row"><span class="label">CLASSIFICATION</span><span id="d-classification"></span></div>
    </div>
    <!-- col 3: action log -->
    <div style="padding-top:40px" class="detail-text-block">
      <h4>ACTION LOG</h4>
      <p id="d-action-log"></p>
    </div>
    <!-- col 4: control cost -->
    <div style="padding-top:40px" class="detail-text-block">
      <h4>CONTROL COST</h4>
      <p id="d-control-cost"></p>
    </div>
  </div>
  <button id="close-btn" onclick="closeDetail()">&lt;&lt;</button>
</div>

<!-- JINX SECTION (bottom of page) -->
<section id="jinx-section">
  <div id="jinx-bg-orb"></div>
  <div id="jinx-content">
    <div id="jinx-labels">
      <span>Add Your Jinx</span>
      <span>Every Jinx added deepens the fog</span>
    </div>
    <div id="jinx-form">
      <input id="jinx-input" type="text" placeholder="TYPE YOUR JINX HERE" maxlength="60" />
      <button id="jinx-submit" onclick="addJinx()">→</button>
    </div>
  </div>
</section>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_OH9hvOpRMTTEIh-A3xUPJ6Y9abDny5t5xqox_0mhHKNd8x6y1b4kaZkqcRw3a50zixTMRuIsuyZ3/pub?gid=736388199&single=true&output=csv';

function getImageURL(row) {
  const id = (row.ImageID || '').trim();
  if (id) return `https://lh3.googleusercontent.com/d/${id}`;
  return `https://placehold.co/400x300/e8e8e8/888?text=${encodeURIComponent(row.Superstition || 'Image')}`;
}

// ── DATA ─────────────────────────────────────────────────────────────
let items = [];
let currentIndex = 0;

async function fetchSheet() {
  const res = await fetch(SHEET_CSV);
  const text = await res.text();
  const rows = text.trim().split('\n');
  const headers = parseCSVRow(rows[0]);
  return rows.slice(1).map(r => {
    const vals = parseCSVRow(r);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

function parseCSVRow(row) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

// ── BUILD SCROLL SECTION ──────────────────────────────────────────────
function buildScrollSection() {
  const section = document.getElementById('scroll-section');
  section.innerHTML = '';

  // sticky container
  const sticky = document.createElement('div');
  sticky.id = 'sticky-container';

  // featured image
  const featWrap = document.createElement('div');
  featWrap.id = 'featured-wrap';
  const featImg = document.createElement('img');
  featImg.id = 'featured-img';
  featImg.onclick = openDetail;
  if (items.length) featImg.src = getImageURL(items[0]);
  featImg.alt = '';
  featWrap.appendChild(featImg);

  // grid strip (show 4 at a time)
  const strip = document.createElement('div');
  strip.id = 'grid-strip';

  sticky.appendChild(featWrap);
  sticky.appendChild(strip);
  section.appendChild(sticky);

  // spacers: one per image
  items.forEach((_, i) => {
    const sp = document.createElement('div');
    sp.className = 'scroll-spacer';
    sp.dataset.index = i;
    section.appendChild(sp);
  });

  updateGridStrip(0);
}

function updateGridStrip(idx) {
  const strip = document.getElementById('grid-strip');
  strip.innerHTML = '';
  // show 4 surrounding images
  const start = Math.max(0, idx - 1);
  const end = Math.min(items.length, start + 4);
  for (let i = start; i < end; i++) {
    const div = document.createElement('div');
    div.className = 'grid-thumb' + (i === idx ? ' active' : '');
    const img = document.createElement('img');
    img.src = getImageURL(items[i]);
    img.alt = '';
    div.appendChild(img);
    strip.appendChild(div);
  }
}

// ── SCROLL HANDLER ────────────────────────────────────────────────────
function onScroll() {
  if (!items.length) return;
  const section = document.getElementById('scroll-section');
  const rect = section.getBoundingClientRect();
  const scrolled = -rect.top;
  const totalHeight = section.offsetHeight - window.innerHeight;
  const progress = Math.max(0, Math.min(1, scrolled / totalHeight));
  const idx = Math.min(items.length - 1, Math.floor(progress * items.length));

  if (idx !== currentIndex) {
    currentIndex = idx;
    const featImg = document.getElementById('featured-img');
    featImg.style.opacity = '0';
    setTimeout(() => {
      featImg.src = getImageURL(items[idx]);
      featImg.style.opacity = '1';
    }, 180);
    updateGridStrip(idx);
  }
}

window.addEventListener('scroll', onScroll, { passive: true });

// ── DETAIL PANEL ──────────────────────────────────────────────────────
function openDetail() {
  const item = items[currentIndex];
  if (!item) return;

  document.getElementById('d-ref').textContent = String(currentIndex + 1).padStart(3, '0');
  document.getElementById('detail-title').textContent = item.Superstition || '';
  document.getElementById('d-category').textContent = item.Category || '';
  document.getElementById('d-region').textContent = item.Region || '';
  document.getElementById('d-classification').textContent = item.Classification || '';
  document.getElementById('d-action-log').textContent = item['Action Log'] || '';
  document.getElementById('d-control-cost').textContent = item['Control Cost'] || '';
  document.getElementById('detail-photo').src = getImageURL(item);

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// close on ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ── FLOATING TEXTS ────────────────────────────────────────────────────
const STORAGE_KEY = 'btf_jinxes';

function loadJinxes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveJinxes(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function addJinx() {
  const input = document.getElementById('jinx-input');
  const val = input.value.trim();
  if (!val) return;
  const jinxes = loadJinxes();
  jinxes.push(val);
  saveJinxes(jinxes);
  spawnFloatingText(val);
  input.value = '';
}

document.getElementById('jinx-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addJinx();
});

function spawnFloatingText(text) {
  const layer = document.getElementById('floating-layer');
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.textContent = text;

  const x = Math.random() * 80 + 2;
  const y = Math.random() * 85 + 2;

  el.style.left = x + '%';
  el.style.top = y + '%';

  layer.appendChild(el);
}

// Parallax: floating layer scrolls up faster than page
function updateFloatingParallax() {
  const layer = document.getElementById('floating-layer');
  const scrollY = window.scrollY;
  layer.style.transform = 'translateY(-' + (scrollY * 0.5) + 'px)';
}

function initFloatingTexts() {
  const jinxes = loadJinxes();
  jinxes.forEach(t => spawnFloatingText(t));
}

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  try {
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
    items = await Promise.race([fetchSheet(), timeout]);
  } catch (e) {
    console.warn('Sheet fetch failed:', e);
    items = [];
  }
  buildScrollSection();
  initFloatingTexts();

  // hide loading
  const loading = document.getElementById('loading');
  loading.classList.add('hidden');
  setTimeout(() => loading.remove(), 700);
}

init();
</script>
</body>
</html>
